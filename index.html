          {

          },
          {
            "@type": "Offer",
            "name": "PRO",

            "priceCurrency": "IDR",

            }
          },
          {

            "priceSpecification": {

              "price": "1000000",
              "priceCurrency": "IDR",

            }
          }
        ],
        "featureList": [

          "Cetak struk thermal 58mm/80mm",
          "Manajemen produk dan barcode",
          "Import produk Excel/CSV",
          "Stok otomatis tercatat",
          "Katalog online shareable",
          "Laporan omzet dan laba",
          "Multiuser admin dan kasir"
        ],

          "@type": "AggregateRating",

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">

        "sameAs": []

    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Apa itu Zona Kasir?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Zona Kasir adalah aplikasi kasir online dan POS berbasis web untuk toko, UMKM, retail, coffee shop, dan bisnis F&B. Anda bisa mengelola transaksi, stok barang, QRIS merchant, katalog online, struk, dan laporan usaha dalam satu sistem."
            }
          },
          {
            "@type": "Question",
            "name": "Apakah Zona Kasir bisa digunakan gratis?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ya. Paket FREE seharga Rp0 sudah mencakup kasir POS, QRIS merchant, katalog online, hingga 50 produk dan 1 akun kasir. Cocok untuk memulai usaha kecil."
            }
          },
          {
            "@type": "Question",
            "name": "Apa beda paket FREE, PRO, dan BUSINESS?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Paket FREE dibatasi 50 produk dan 1 akun kasir dengan struk berbranding Zona Kasir. Paket PRO Rp50.000/bulan memberi produk lebih banyak, multiple kasir, Open Bill, voucher/promo, pajak & service charge, rekapitulasi laporan lengkap, dan struk tanpa branding. Paket BUSINESS mulai Rp1 jutaan/tahun mencakup semua fitur PRO ditambah custom aplikasi/branding, setup khusus, dan payment gateway QRIS dinamis Midtrans dengan status pembayaran otomatis."
            }
          },
          {
            "@type": "Question",
            "name": "Apa itu paket BUSINESS dan apa keunggulannya?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Paket BUSINESS ditujukan untuk bisnis yang ingin sistem lebih profesional dengan custom aplikasi, custom branding, dan setup khusus. BUSINESS mendukung payment gateway QRIS dinamis menggunakan Midtrans, di mana QR pembayaran dibuat otomatis sesuai nominal transaksi dan status pembayaran diperbarui otomatis melalui webhook. Harga mulai dari Rp1 jutaan/tahun dan menyesuaikan kebutuhan merchant. Payment gateway QRIS dinamis hanya tersedia di paket BUSINESS."
            }
          },
          {
            "@type": "Question",
            "name": "Apakah Zona Kasir cocok untuk toko retail?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sangat cocok. Zona Kasir mendukung manajemen produk dan barcode, stok otomatis, serta laporan penjualan untuk minimarket, warung, toko pakaian, kosmetik, dan bakery."
            }
          },
          {
            "@type": "Question",
            "name": "Apakah Zona Kasir cocok untuk coffee shop dan cafe?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ya. Untuk coffee shop, cafe, dan resto tersedia fitur Open Bill di paket PRO, pajak dan service charge, serta cetak struk thermal."
            }
          },
          {
            "@type": "Question",
            "name": "Apakah bisa menggunakan QRIS sendiri?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Bisa. Zona Kasir menggunakan QRIS statis milik merchant Anda sendiri dengan konfirmasi pembayaran manual, sehingga dana langsung masuk ke rekening usaha Anda."
            }
          },
          {
            "@type": "Question",
            "name": "Apakah bisa cetak struk thermal?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Bisa. Zona Kasir mendukung cetak struk thermal ukuran 58mm dan 80mm."
            }
          },
          {
            "@type": "Question",
            "name": "Apakah bisa import produk dari Excel?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Bisa. Anda dapat mengimpor produk dari file Excel/CSV. Paket FREE mengikuti batas plan, sedangkan paket PRO tanpa batas plan."
            }
          },
          {
            "@type": "Question",
            "name": "Apakah tersedia katalog online?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ya. Setiap merchant mendapat link katalog publik seperti /store/{slug} yang bisa dibagikan ke pelanggan, dengan order via WhatsApp tanpa perlu website tambahan."
            }
          },
          {
            "@type": "Question",
            "name": "Apakah data setiap merchant terpisah?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ya. Setiap merchant memiliki data produk, transaksi, stok, dan laporan yang terpisah dan aman."
            }
          }
        ]
      }
    </script>
